<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Team Route Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        :root { --primary-color: #1e3a8a; --accent-color: #2563eb; --bg-color: #f8fafc; --panel-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: var(--primary-color); color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; }
        #story-panel { width: 380px; background: var(--panel-bg); display: flex; flex-direction: column; border-left: 1px solid #e2e8f0; }
        .timeline-scroll-area { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .timeline-card { background: #ffffff; border: 1px solid #e2e8f0; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.96); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-overlay.open { display: flex; }
        .modal-box { width: 90%; max-width: 850px; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 0.75rem; }
        .close-overlay-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .fallback-container { margin-top: 1.5rem; text-align: center; color: #94a3b8; }
        .fallback-btn { display: inline-block; margin-top: 0.5rem; padding: 0.6rem 1.2rem; background-color: #2563eb; color: white; text-decoration: none; font-weight: bold; border-radius: 0.375rem; }
        .highlight-link-btn { display: inline-block; margin-top: 10px; padding: 0.5rem 0.75rem; background-color: var(--accent-color); color: white !important; text-decoration: none; font-size: 12px; border-radius: 0.375rem; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>🏆 World Cup Journey Engine</h1><select id="country-select"><option value="">Select a Country...</option></select></header>
    <div id="main-container">
        <div id="map"></div>
        <div id="story-panel">
            <div id="timeline-box" class="timeline-scroll-area"><div id="appended-cards-container"></div></div>
        </div>
    </div>
    <div id="theater-overlay" class="video-overlay">
        <div class="modal-box">
            <button id="close-overlay" class="close-overlay-btn">✕ Close Player</button>
            <iframe id="theater-iframe" src="" allow="autoplay; encrypted-media; fullscreen"></iframe>
        </div>
        <div class="fallback-container">
            <p>Missing video?</p>
            <a id="fallback-youtube-link" href="#" target="_blank" class="fallback-btn">▶️ Open Directly on YouTube</a>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script>
        const map = L.map('map').setView([28, -50], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        const theaterOverlay = document.getElementById('theater-overlay');
        const theaterIframe = document.getElementById('theater-iframe');
        const fallbackYoutubeLink = document.getElementById('fallback-youtube-link');

        window.launchTheaterPlayer = function(embedUrl) {
            theaterIframe.src = embedUrl;
            // Robust extraction of Video ID to create a valid direct watch link
            const videoId = embedUrl.split('/').pop();
            fallbackYoutubeLink.href = `https://www.youtube.com/watch?v=${videoId}`;
            theaterOverlay.classList.add('open');
        };

        document.getElementById('close-overlay').addEventListener('click', () => {
            theaterOverlay.classList.remove('open');
            theaterIframe.src = "";
        });

        const dropdown = document.getElementById('country-select');
        Object.keys(worldCupData).sort().forEach(code => {
            const opt = document.createElement('option'); opt.value = code; opt.textContent = code;
            dropdown.appendChild(opt);
        });

        dropdown.addEventListener('change', (e) => {
            const selection = e.target.value;
            const container = document.getElementById('appended-cards-container');
            container.innerHTML = '';
            if (worldCupData[selection]) {
                worldCupData[selection].forEach((stop, i) => {
                    const card = document.createElement('div');
                    card.className = 'timeline-card';
                    card.innerHTML = `<h3>${stop.title}</h3><p>${stop.desc}</p>`;
                    if (stop.videoEmbedUrl) {
                        const btn = document.createElement('a');
                        btn.className = 'highlight-link-btn';
                        btn.textContent = '📺 Watch Highlights';
                        btn.onclick = () => launchTheaterPlayer(stop.videoEmbedUrl);
                        card.appendChild(btn);
                    }
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
