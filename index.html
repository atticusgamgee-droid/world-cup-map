<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>World Cup Team Route Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        :root { --primary-color: #1e3a8a; --accent-color: #2563eb; --bg-color: #f8fafc; --panel-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); }
        header { background: var(--primary-color); color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 1000; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; }
        #story-panel { width: 380px; background: var(--panel-bg); display: flex; flex-direction: column; border-left: 1px solid #e2e8f0; z-index: 999; }
        .panel-header { padding: 1.5rem; border-bottom: 1px solid #e2e8f0; }
        .timeline-scroll-area { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .timeline-card { background: #ffffff; border: 1px solid #e2e8f0; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; display: flex; gap: 1rem; animation: slideIn 0.4s ease-out; }
        .timeline-card.latest-active { border-color: var(--accent-color); background: #eff6ff; }
        .card-dot { width: 1rem; height: 1rem; border-radius: 50%; border: 2px solid var(--text-muted); flex-shrink: 0; }
        .timeline-card.latest-active .card-dot { border-color: var(--accent-color); background: var(--accent-color); }
        .badge { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .panel-footer { padding: 1rem; border-top: 1px solid #e2e8f0; }
        .btn-next { width: 100%; padding: 0.8rem; background: var(--text-main); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 700; }
        .btn-next:disabled { background: #cbd5e1; cursor: not-allowed; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,23,42,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-overlay.open { display: flex; }
        .modal-box { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 0.5rem; }
        .close-overlay-btn { position: absolute; top: -40px; right: 0; color: white; cursor: pointer; border: none; background: none; font-weight: bold; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header><h1>🏆 World Cup Journey</h1><select id="country-select"><option value="">Select Team...</option></select></header>
    <div id="main-container">
        <div id="map"></div>
        <div id="story-panel">
            <div class="panel-header"><h2 id="team-title">Select a Team</h2></div>
            <div id="timeline-box" class="timeline-scroll-area"><div id="appended-cards-container"></div></div>
            <div id="footer-actions" class="panel-footer" style="display: none;"><button id="next-btn" class="btn-next">Next Destination ➡️</button></div>
        </div>
    </div>
    <div id="theater-overlay" class="video-overlay">
        <div class="modal-box">
            <button id="close-overlay" class="close-overlay-btn">✕ Close</button>
            <iframe id="theater-iframe" src="" allow="autoplay; fullscreen"></iframe>
        </div>
        <div id="fallback-container" style="display: none; margin-top: 20px;">
            <a id="fallback-link" href="#" target="_blank" style="color: white; font-weight: bold;">Watch on YouTube</a>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script>
        const map = L.map('map', { center: [28, -50], zoom: 3 });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        
        let activeJourneyData = [], currentStepIndex = 0;
        const markerLayerGroup = L.layerGroup().addTo(map);
        const pathLayerGroup = L.layerGroup().addTo(map);

        const dropdown = document.getElementById('country-select');
        Object.keys(worldCupData).sort().forEach(code => {
            const opt = document.createElement('option'); opt.value = code; opt.textContent = code;
            dropdown.appendChild(opt);
        });

        window.launchTheaterPlayer = function(url) {
            document.getElementById('theater-iframe').src = url;
            const vid = url.split('/').pop().split('?')[0];
            document.getElementById('fallback-link').href = `https://www.youtube.com/watch?v=${vid}`;
            document.getElementById('fallback-container').style.display = 'block';
            document.getElementById('theater-overlay').classList.add('open');
        };

        document.getElementById('close-overlay').onclick = () => {
            document.getElementById('theater-overlay').classList.remove('open');
            document.getElementById('theater-iframe').src = "";
        };

        function renderStep(index) {
            const stop = activeJourneyData[index];
            const card = document.createElement('div');
            card.className = 'timeline-card latest-active';
            card.innerHTML = `<div class="card-dot"></div><div><div class="badge">${stop.badge}</div><h3>${stop.title}</h3><p>${stop.desc}</p></div>`;
            document.getElementById('appended-cards-container').appendChild(card);

            const icon = L.divIcon({ html: `<div style="background:#2563eb; color:white; border-radius:50%; width:24px; height:24px; text-align:center; font-size:12px; border:2px solid white;">${index + 1}</div>` });
            L.marker(stop.latlng, { icon }).addTo(markerLayerGroup);
            
            if(index > 0) L.polyline(activeJourneyData.slice(0, index+1).map(s => s.latlng), {color: '#2563eb', dashArray: '5,5'}).addTo(pathLayerGroup);
            
            map.flyTo(stop.latlng, 6);
            
            const btn = document.getElementById('next-btn');
            btn.disabled = (index === activeJourneyData.length - 1);
            btn.textContent = btn.disabled ? "Journey Completed" : "Next Destination ➡️";
        }

        dropdown.onchange = (e) => {
            activeJourneyData = worldCupData[e.target.value] || [];
            currentStepIndex = 0;
            document.getElementById('appended-cards-container').innerHTML = '';
            markerLayerGroup.clearLayers();
            pathLayerGroup.clearLayers();
            document.getElementById('footer-actions').style.display = activeJourneyData.length ? 'block' : 'none';
            if(activeJourneyData.length) renderStep(0);
        };

        document.getElementById('next-btn').onclick = () => {
            if(currentStepIndex < activeJourneyData.length - 1) renderStep(++currentStepIndex);
        };
    </script>
</body>
</html>
